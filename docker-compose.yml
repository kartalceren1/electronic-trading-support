services:

  postgres:

    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: trading_support

    ports:
      - "5432:5432"

    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql


  app:

    build: .

    ports:
      - "5000:5000"

    depends_on:
      - postgres